services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ${TJOB_NAME}-db
    environment:
      POSTGRES_DB: tfg_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jenkins_network

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build: ./devorapp/backend
    container_name: ${TJOB_NAME}-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@${TJOB_NAME}-db:5432/tfg_db
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_prod}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-firebase-service-account.json}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      KERAS_API_URL: ${KERAS_API_URL:-http://keras-api:8001/predict}
      SKIP_EMAIL_VERIFICATION: "true"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jenkins_network

  # ── React frontend (nginx) ────────────────────────────────────────────────────
  frontend:
    build: ./devorapp/frontend
    container_name: ${TJOB_NAME}-frontend
    ports:
      - "${frontend_port:-80}:80"
    depends_on:
      - backend
    networks:
      - jenkins_network

volumes:
  postgres_data:

networks:
  jenkins_network:
    external: true
